name: code-server

services:
  code-server:
    image: ${CODE_SERVER_IMAGE:-ghcr.io/coder/code-server:4.121.0}
    container_name: code-server
    restart: unless-stopped
    user: "${HOST_UID}:${HOST_GID}"
    environment:
      DOCKER_USER: "${DOCKER_USER}"
      PASSWORD: "${CODE_SERVER_PASSWORD}"
      TZ: "${TZ:-Asia/Seoul}"
    ports:
      - "${CODE_SERVER_HOST:-127.0.0.1}:${CODE_SERVER_PORT:-12345}:8080"
    volumes:
      - ./.code-server/local:/home/coder/.local
      - ./.code-server/config:/home/coder/.config
      - ./.codex:/home/coder/.codex
      - ./workspace:/home/coder/project
    command:
      - --bind-addr
      - 0.0.0.0:8080
      - /home/coder/project
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -o /dev/null http://127.0.0.1:8080/login",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
